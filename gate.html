<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZUNGU 2027 — Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            unbounded: ['Unbounded', 'sans-serif'],
            mono: ['Space Mono', 'monospace'],
          },
        },
      },
    };
  </script>
  <!-- React + ReactDOM (UMD) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Lucide icons (UMD) -->
  <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.js" crossorigin></script>
  <!-- Babel standalone — transforms JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background-color: #060808; cursor: crosshair; margin: 0; }
    ::selection { background: #C8A84B; color: #060808; }
    * { box-sizing: border-box; }
    /* whitespace:pre-wrap for multi-line headings */
    .pre-wrap { white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState } = React;
    const { createRoot } = ReactDOM;
    const { ArrowRight, X, Compass, ChevronRight, Target, BarChart3 } = LucideReact;

    // --- Design Tokens ---
    const C = {
      black: "#060808",
      gold:  "#C8A84B",
      cream: "#F2EBD9",
      rust:  "#C45A2A",
      muted: "#6B6355",
      white: "#F7F3EC",
    };

    // --- Button ---
    function Button({ children, onClick, variant = "primary", className = "" }) {
      const base = "relative px-8 py-4 font-bold transition-all duration-300 uppercase tracking-[0.2em] text-[10px] flex items-center justify-center gap-3 border font-mono cursor-crosshair";
      const styleMap = {
        primary:   { color: C.gold,  borderColor: `${C.gold}55`, backgroundColor: "transparent" },
        secondary: { color: C.white, borderColor: "rgba(255,255,255,0.2)", backgroundColor: "transparent" },
        gold:      { color: C.black, borderColor: C.gold, backgroundColor: C.gold },
      };
      const hoverIn = {
        primary:   e => { e.currentTarget.style.backgroundColor = C.gold;  e.currentTarget.style.color = C.black; },
        secondary: e => { e.currentTarget.style.borderColor = "rgba(255,255,255,0.7)"; },
        gold:      e => { e.currentTarget.style.filter = "brightness(1.1)"; },
      };
      const hoverOut = {
        primary:   e => { e.currentTarget.style.backgroundColor = "transparent"; e.currentTarget.style.color = C.gold; },
        secondary: e => { e.currentTarget.style.borderColor = "rgba(255,255,255,0.2)"; },
        gold:      e => { e.currentTarget.style.filter = ""; },
      };
      return (
        <button
          onClick={onClick}
          className={`${base} ${className}`}
          style={styleMap[variant]}
          onMouseEnter={hoverIn[variant]}
          onMouseLeave={hoverOut[variant]}
        >
          {children}
        </button>
      );
    }

    // --- Input ---
    function InputField({ label, type = "text", placeholder, options }) {
      return (
        <div className="flex flex-col gap-2 mb-8">
          <div className="flex justify-between items-center">
            <label className="text-[8px] font-mono uppercase tracking-[0.3em] font-bold" style={{ color: C.gold }}>{label}</label>
            <span className="text-[7px] font-mono" style={{ color: C.muted }}>[REQUIRED]</span>
          </div>
          {type === "select" ? (
            <div className="relative">
              <select
                className="w-full p-4 font-mono text-[10px] focus:outline-none appearance-none cursor-pointer uppercase tracking-widest"
                style={{ backgroundColor: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", color: C.white }}
              >
                {options.map(opt => (
                  <option key={opt} value={opt} style={{ backgroundColor: C.black, color: C.cream }}>{opt}</option>
                ))}
              </select>
              <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none" style={{ color: `${C.gold}55` }}>
                <ChevronRight size={14} style={{ transform: "rotate(90deg)" }} />
              </div>
            </div>
          ) : (
            <input
              type={type}
              placeholder={placeholder}
              className="p-4 font-mono text-[10px] focus:outline-none uppercase tracking-widest"
              style={{ backgroundColor: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", color: C.white }}
              onFocus={e  => { e.target.style.borderColor = C.gold; }}
              onBlur={e   => { e.target.style.borderColor = "rgba(255,255,255,0.1)"; }}
            />
          )}
        </div>
      );
    }

    // --- Gate View ---
    function GateView({ onRole }) {
      return (
        <div
          className="relative min-h-screen w-full flex flex-col items-center justify-center overflow-hidden px-8 text-center font-mono"
          style={{ backgroundColor: C.black }}
        >
          {/* Radial glow */}
          <div
            className="absolute inset-0 pointer-events-none"
            style={{ background: "radial-gradient(circle at center, rgba(200,168,75,0.06) 0%, transparent 70%)" }}
          />

          {/* Logo mark */}
          <div className="relative z-10 mb-16 flex flex-col items-center">
            <div className="w-20 h-20 mb-12 relative flex items-center justify-center">
              <div className="absolute inset-0 rotate-45" style={{ border: `1px solid ${C.gold}33` }} />
              <div className="w-12 h-12 flex items-center justify-center" style={{ border: `2px solid ${C.gold}` }}>
                <div className="w-2 h-2" style={{ backgroundColor: C.gold }} />
              </div>
            </div>
            <h1
              className="text-6xl md:text-9xl font-black tracking-[-0.05em] uppercase font-unbounded mb-2"
              style={{ color: C.white }}
            >
              ZUNGU
            </h1>
            <div className="flex items-center gap-6 uppercase font-bold text-[8px]" style={{ color: C.gold, letterSpacing: "0.5em" }}>
              <span>Navy Island</span>
              <div className="w-1 h-1 rotate-45" style={{ backgroundColor: C.rust }} />
              <span>MMXXVII</span>
            </div>
          </div>

          {/* CTA block */}
          <div className="relative z-10 max-w-lg w-full">
            <p className="text-[9px] uppercase tracking-[0.4em] mb-12 font-bold italic" style={{ color: C.muted }}>
              // ACCESS AUTHORIZATION REQUIRED
            </p>
            <div className="grid grid-cols-1 gap-4 max-w-xs mx-auto">
              <Button onClick={() => onRole("investor")}  variant="primary">Investor Entrance</Button>
              <Button onClick={() => onRole("supplier")}  variant="secondary">Production &amp; Logistics</Button>
              <Button onClick={() => onRole("attendee")}  variant="secondary">General Admission</Button>
            </div>
            <button
              onClick={() => onRole("attendee")}
              className="mt-20 text-[8px] uppercase tracking-[0.5em] transition-all flex items-center justify-center gap-4 w-full"
              style={{ color: C.muted }}
              onMouseEnter={e => { e.currentTarget.style.color = C.gold; }}
              onMouseLeave={e => { e.currentTarget.style.color = C.muted; }}
            >
              View Strategic Vision <ArrowRight size={12} />
            </button>
          </div>
        </div>
      );
    }

    // --- Form View ---
    function FormView({ type, onBack, onSubmit }) {
      return (
        <div
          className="min-h-screen w-full flex items-center justify-center p-6 font-mono"
          style={{ backgroundColor: C.black }}
        >
          <div
            className="max-w-2xl w-full p-12 md:p-20 shadow-2xl relative"
            style={{ backgroundColor: C.black, border: "1px solid rgba(255,255,255,0.05)" }}
          >
            <button
              onClick={onBack}
              className="absolute top-10 right-10 transition-colors"
              style={{ color: C.muted }}
              onMouseEnter={e => { e.currentTarget.style.color = C.gold; }}
              onMouseLeave={e => { e.currentTarget.style.color = C.muted; }}
            >
              <X size={20} />
            </button>

            <div className="mb-16">
              <div className="inline-block px-3 py-1 mb-8" style={{ border: `1px solid ${C.rust}66` }}>
                <h3 className="text-[8px] uppercase tracking-[0.4em] font-bold" style={{ color: C.rust }}>
                  {type === "investor" ? "STRATEGIC PARTNER" : "PRODUCTION UNIT"}
                </h3>
              </div>
              <h2
                className="text-4xl font-black uppercase font-unbounded leading-tight tracking-tighter mb-6 pre-wrap"
                style={{ color: C.white }}
              >
                {type === "investor" ? "Patient\nCapital." : "Technical\nStandard."}
              </h2>
              <p className="text-[10px] leading-relaxed max-w-sm uppercase tracking-widest font-bold" style={{ color: C.muted }}>
                {type === "investor"
                  ? "Securing long-term equity in the Portland Parish cultural revitalization project."
                  : "Registering credentials for the 2027 infrastructure build-out."}
              </p>
            </div>

            <form onSubmit={onSubmit}>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-x-10">
                <InputField label="Entity Name"  placeholder="ENTER IDENTIFIER" />
                <InputField label="Secure Email" placeholder="CONTACT@ZUNGU.COM" type="email" />
                {type === "investor" ? (
                  <>
                    <InputField label="Capital Tier"  type="select" options={["$50K – $250K", "$250K – $1M", "$1M+"]} />
                    <InputField label="Investor Type" type="select" options={["Strategic", "Individual", "VC", "Corporate"]} />
                  </>
                ) : (
                  <>
                    <InputField label="Specialization"       type="select" options={["Stage Craft", "Sound Eng", "Lighting", "Talent", "Logistics"]} />
                    <InputField label="Reference / Portfolio" placeholder="HTTPS://" />
                  </>
                )}
              </div>
              <Button variant="gold" className="w-full mt-12 py-6" onClick={onSubmit}>
                Submit Credentials
              </Button>
            </form>
          </div>
        </div>
      );
    }

    // --- Dashboard View ---
    function DashboardView({ role, onReset }) {
      const cards = [
        { icon: <Target size={24} style={{ color: C.rust }} />, label: "Goal 01", title: "Cultural Anchor", body: "Establishing Jamaica as the global destination for high-net-worth electronic music pilgrimage." },
        { icon: <BarChart3 size={24} style={{ color: C.gold }} />, label: "Goal 02", title: "Tourism Yield",   body: "Transitioning from low-yield mass tourism to high-margin, low-impact boutique experiences." },
        { icon: <Compass size={24} style={{ color: C.rust }} />, label: "Goal 03", title: "Local Equity",    body: "Direct economic integration with Portland Parish labor and supply chains." },
      ];
      return (
        <div className="min-h-screen font-mono" style={{ backgroundColor: C.black, color: C.white }}>
          {/* Nav */}
          <nav
            className="flex justify-between items-center px-6 md:px-12 py-8 sticky top-0 z-50 backdrop-blur-xl"
            style={{ borderBottom: "1px solid rgba(255,255,255,0.05)", backgroundColor: "rgba(6,8,8,0.9)" }}
          >
            <div className="text-2xl font-black tracking-tighter font-unbounded" style={{ color: C.white }}>ZUNGU</div>
            <div className="hidden lg:flex gap-12 text-[9px] uppercase tracking-[0.3em] font-bold" style={{ color: C.muted }}>
              {["Vision", "Financials", "Manifesto"].map(l => (
                <a key={l} href="#"
                  style={{ color: C.muted }}
                  onMouseEnter={e => { e.target.style.color = C.gold; }}
                  onMouseLeave={e => { e.target.style.color = C.muted; }}
                >{l}</a>
              ))}
            </div>
            <div
              className="text-[8px] px-4 py-2 uppercase tracking-[0.2em] font-bold"
              style={{ border: `1px solid ${C.gold}55`, color: C.gold }}
            >
              LOGGED: {role}
            </div>
          </nav>

          {/* Hero */}
          <header
            className="relative flex items-center justify-center text-center px-8"
            style={{ height: "85vh", borderBottom: "1px solid rgba(255,255,255,0.05)" }}
          >
            <div className="absolute inset-0 z-0 overflow-hidden">
              <img
                src="https://images.unsplash.com/photo-1549413242-2b281f621764?auto=format&fit=crop&q=80&w=2000"
                className="w-full h-full object-cover"
                style={{ opacity: 0.18, filter: "grayscale(1) brightness(0.5)" }}
                alt=""
              />
              <div
                className="absolute inset-0"
                style={{ background: `linear-gradient(to top, ${C.black}, rgba(6,8,8,0.4), transparent)` }}
              />
            </div>

            <div className="relative z-10 max-w-5xl w-full">
              <div className="flex items-center justify-center gap-4 mb-12">
                <div className="w-8 h-[1px]" style={{ backgroundColor: C.gold }} />
                <h2 className="text-[10px] uppercase tracking-[0.6em] font-bold" style={{ color: C.gold }}>
                  ESTABLISHED 2027 &bull; PORT ANTONIO
                </h2>
                <div className="w-8 h-[1px]" style={{ backgroundColor: C.gold }} />
              </div>
              <h1
                className="font-black uppercase font-unbounded tracking-tighter leading-[0.85] mb-12 pre-wrap"
                style={{ fontSize: "clamp(3.5rem,12vw,10rem)", color: C.white }}
              >
                {role === "investor" ? "PATIENT\nCAPITAL" : "BRUTAL\nLUXURY"}
              </h1>
              <p className="mx-auto text-[11px] leading-relaxed tracking-[0.3em] uppercase max-w-xl font-bold" style={{ color: C.muted }}>
                {role === "investor"
                  ? "A strategic argument for the revitalization of Navy Island through institutional cultural assets."
                  : "A greenfield destination experience defined by raw textures and refined architecture."}
              </p>
            </div>
          </header>

          {/* Cards */}
          <section className="py-24 px-6 md:px-12 max-w-7xl mx-auto">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-px" style={{ backgroundColor: "rgba(255,255,255,0.05)" }}>
              {cards.map(({ icon, label, title, body }) => (
                <div key={label} className="p-12" style={{ backgroundColor: C.black, border: "1px solid rgba(255,255,255,0.05)" }}>
                  <div className="mb-8">{icon}</div>
                  <h3 className="text-[8px] uppercase tracking-[0.4em] font-bold mb-4" style={{ color: C.muted }}>{label}</h3>
                  <h4 className="text-xl font-unbounded font-black uppercase mb-6 tracking-tight" style={{ color: C.white }}>{title}</h4>
                  <p className="text-[10px] leading-relaxed uppercase tracking-widest" style={{ color: C.muted }}>{body}</p>
                </div>
              ))}
            </div>
          </section>

          {/* Footer */}
          <footer className="py-24 text-center" style={{ borderTop: "1px solid rgba(255,255,255,0.05)", backgroundColor: C.black }}>
            <div className="text-3xl font-black font-unbounded tracking-tighter mb-4" style={{ color: C.white }}>ZUNGU</div>
            <p className="text-[8px] tracking-[0.8em] uppercase mb-12" style={{ color: C.muted }}>
              PORT ANTONIO &middot; JAMAICA &middot; 2027
            </p>
            <div className="flex justify-center gap-12">
              <button
                onClick={onReset}
                className="text-[9px] uppercase tracking-widest font-bold pb-1"
                style={{ color: C.gold, borderBottom: `1px solid ${C.gold}33` }}
              >
                Reset Session
              </button>
              <button className="text-[9px] uppercase tracking-widest font-bold" style={{ color: C.muted }}>
                Network Status: Online
              </button>
            </div>
          </footer>
        </div>
      );
    }

    // --- App ---
    function App() {
      const [stage, setStage] = useState("gate");
      const [role,  setRole]  = useState(null);

      const handleRole = r => {
        setRole(r);
        setStage(r === "attendee" ? "dashboard" : "form");
      };
      const handleSubmit = e => { e.preventDefault(); setStage("dashboard"); };

      return (
        <>
          {stage === "gate"      && <GateView onRole={handleRole} />}
          {stage === "form"      && <FormView type={role} onBack={() => setStage("gate")} onSubmit={handleSubmit} />}
          {stage === "dashboard" && <DashboardView role={role} onReset={() => { setRole(null); setStage("gate"); }} />}
        </>
      );
    }

    createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
